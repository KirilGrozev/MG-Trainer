{% extends 'base.html' %}
{% load static %}
{% block additional_css %}
    <link rel="stylesheet" href="{% static 'css/base_from.css' %}">
{% endblock %}
{% block title %}Редактиране на мач{% endblock %}
{% block content %}

    <div class="form-page">
        <div class="form-panel">
            <div class="form-panel-header">
                <h2>Редактиране на мач</h2>
                <p>Поправи информацията по-долу, за да редактираш мач в системата.</p>
            </div>

            <div class="form-panel-body">
                <form method="POST" action="{% url 'edit match' pk=object.id %}">
                    {{ form.as_p }}
                    {% csrf_token %}

                    <div class="form-actions">
                        <button type="submit" class="btn-main">Редактирай</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

{% endblock %}
